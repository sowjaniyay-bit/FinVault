<!DOCTYPE html><html lang="en"><head>
  <link rel="manifest" href="pwa-manifest.json"/>
  <meta name="theme-color" content="#7c5cbf"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="FinVault"/>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FinVault — Reports</title>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{margin:0;}
.ctrl-bar{background:var(--white);border-bottom:1.5px solid var(--brd);padding:12px 22px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0;}
.ctrl{display:flex;flex-direction:column;gap:4px;}
.cl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);}
.cr{display:flex;gap:6px;align-items:center;}
.ci{background:var(--bg);border:1.5px solid var(--brd2);color:var(--ink);padding:8px 11px;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:13px;}
.ci:focus{border-color:var(--v);outline:none;box-shadow:var(--sv);}
.dv{width:1px;height:30px;background:var(--brd2);}
.rep-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
.rep-body::-webkit-scrollbar{width:4px;}.rep-body::-webkit-scrollbar-thumb{background:var(--lav);border-radius:4px;}
/* Single chart card */
.chart-card{background:var(--white);border:1.5px solid var(--brd);border-radius:var(--r2);padding:16px 20px;}
.cc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cc-title{font-size:13px;font-weight:700;color:var(--ink);}
.chart-tabs{display:flex;gap:5px;}
.ctab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--brd2);background:var(--bg);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;color:var(--ink4);transition:all .15s;}
.ctab.on{background:var(--grad);color:#fff;border-color:transparent;}
/* Results */
.res-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rc{background:var(--white);border:1.5px solid var(--brd);border-radius:var(--r2);padding:16px 18px;}
.rc-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--v);margin-bottom:12px;}
.s3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.st{background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--r);padding:11px;text-align:center;transition:all .18s;}
.st:hover{border-color:var(--lav);background:var(--bg-lav);transform:translateY(-1px);}
.st-l{font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);margin-bottom:5px;}
.st-v{font-family:'DM Serif Display',serif;font-size:16px;color:var(--ink);}
.cat-br{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-br-lbl{font-size:12px;color:var(--ink3);min-width:85px;}
.cat-br-track{flex:1;height:5px;background:var(--brd2);border-radius:3px;overflow:hidden;}
.cat-br-fill{height:100%;border-radius:3px;background:var(--grad);transition:width .8s ease;}
.cat-br-amt{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink4);min-width:55px;text-align:right;}
.mo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border:1.5px solid var(--brd);border-radius:8px;margin-bottom:5px;font-size:12px;transition:all .14s;}
.mo-row:hover{border-color:var(--lav);background:var(--bg-lav);}
.exp-btns{display:flex;gap:8px;}
.exp-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .18s;}
.exp-csv{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}.exp-csv:hover{background:var(--green);color:#fff;}
.exp-pdf{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}.exp-pdf:hover{background:var(--red);color:#fff;}
</style>
</head>
<body class="app-shell">
<aside class="sidebar">
  <a class="sb-brand" href="home_app.html"><div class="sb-gem">💜</div><span class="sb-wordmark">FinVault</span></a>
  <div class="sb-section-line"></div>
  <a class="sb-item" href="home_app.html"><div class="sb-ic">🏠</div><span class="sb-label">Home</span></a>
  <a class="sb-item" href="dashboard.html"><div class="sb-ic">⊞</div><span class="sb-label">Dashboard</span></a>
  <a class="sb-item" href="transactions.html"><div class="sb-ic">💳</div><span class="sb-label">Transactions</span></a>
  <a class="sb-item" href="budget.html"><div class="sb-ic">📊</div><span class="sb-label">Budget</span></a>
  <div class="sb-section-line"></div>
  <a class="sb-item" href="goals.html"><div class="sb-ic">◇</div><span class="sb-label">Goals</span></a>
  <a class="sb-item on" href="reports.html"><div class="sb-ic">▦</div><span class="sb-label">Reports</span></a>
  <a class="sb-item" href="insights.html"><div class="sb-ic">◎</div><span class="sb-label">Insights</span></a>
  <a class="sb-item" href="dues.html"><div class="sb-ic">📅</div><span class="sb-label">Dues</span></a>
  <a class="sb-item" href="ai_nudges.html"><div class="sb-ic">🔔</div><span class="sb-label">AI Nudges</span></a>
  
  <div class="sb-section-line"></div>
  <a class="sb-item" href="profile.html"><div class="sb-ic">👤</div><span class="sb-label">Profile</span></a>
  <a class="sb-item" href="about.html"><div class="sb-ic">ℹ</div><span class="sb-label">About</span></a>
  <div class="sb-foot">
    <div class="sb-email-wrap"><div class="sb-avatar" id="sb-av">?</div><div class="sb-email" id="sb-email"></div></div>
    <button class="btn-out" onclick="logout()" title="Sign Out">↩</button>
  </div>
</aside>
<div class="app-main">
  <div class="app-topbar">
    <div><div class="pg-label">Analytics</div><div class="pg-title">Reports</div></div>
    <div class="topbar-right">
      <div class="exp-btns">
        <button class="exp-btn exp-csv" onclick="doCSV()">⬇ CSV</button>
        <button class="exp-btn exp-pdf" onclick="doPDF()">⬇ PDF</button>
      </div>
    </div>
  </div>
  <div class="ctrl-bar">
    <div class="ctrl"><div class="cl">Monthly</div><div class="cr"><input type="month" class="ci" id="r-month"/><button class="btn btn-primary" onclick="loadMonthly()" style="padding:7px 14px;font-size:12.5px">Generate →</button></div></div>
    <div class="dv"></div>
    <div class="ctrl"><div class="cl">Yearly</div><div class="cr"><input type="number" class="ci" id="r-year" placeholder="2025" style="width:76px"/><button class="btn btn-ghost" onclick="loadYearly()" style="padding:7px 14px;font-size:12.5px">Generate →</button></div></div>
    <div class="dv"></div>
    <div class="ctrl"><div class="cl">Overview</div><div class="cr"><button class="btn btn-soft" onclick="loadChart()" style="padding:7px 14px;font-size:12.5px">Load Chart →</button></div></div>
  </div>
  <div class="rep-body">
    <!-- ONE chart with style tabs -->
    <div class="chart-card">
      <div class="cc-hd">
        <div class="cc-title">Monthly Overview</div>
        <div class="chart-tabs">
          <button class="ctab on" onclick="switchChart('area',this)">Area</button>
          <button class="ctab" onclick="switchChart('bar',this)">Bar</button>
          <button class="ctab" onclick="switchChart('polar',this)">Polar</button>
        </div>
      </div>
      <div style="position:relative;height:160px"><canvas id="mainChart"></canvas></div>
    </div>
    <!-- Results: monthly + yearly side by side -->
    <div class="res-row">
      <div class="rc">
        <div class="rc-label" id="m-title">Monthly Report</div>
        <div class="s3" id="m-stats"><div style="color:var(--ink4);font-size:12px;grid-column:1/-1">Generate above →</div></div>
        <div id="m-cats"></div>
        <div id="m-alert"></div>
      </div>
      <div class="rc">
        <div class="rc-label" id="y-title">Yearly Report</div>
        <div class="s3" id="y-stats"><div style="color:var(--ink4);font-size:12px;grid-column:1/-1">Generate above →</div></div>
        <div id="y-months"></div>
      </div>
    </div>
  </div>
</div>
<script>
const API="http://127.0.0.1:5000";
const tok=()=>localStorage.getItem("authToken");
const hdr=()=>({"Content-Type":"application/json","Authorization":"Bearer "+tok()});
const fmt=n=>"₹"+Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:0});
if(!tok()||tok()==="null"||!tok().trim())window.location.href="login.html";
function logout(){localStorage.clear();window.location.href="login.html";}
async function apiFetch(url,opts={}){const r=await fetch(url,opts);if(r.status===401){localStorage.removeItem("authToken");window.location.href="login.html";throw new Error("401");}return r;}
fetch(API+"/me",{headers:hdr()}).then(r=>r.json()).then(d=>{if(!d.email)return;document.getElementById("sb-av").textContent=d.email[0].toUpperCase();document.getElementById("sb-email").textContent=d.email;}).catch(()=>{});
const now=new Date();
document.getElementById("r-month").value=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
document.getElementById("r-year").value=now.getFullYear();

let _chartData=null,_chartType="area";
function switchChart(t,btn){_chartType=t;document.querySelectorAll(".ctab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");if(_chartData)renderChart(_chartData);}

function renderChart(data){
  _chartData=data;
  const labels=Object.keys(data),inc=labels.map(m=>data[m].income),exp=labels.map(m=>data[m].expense);
  const ctx=document.getElementById("mainChart").getContext("2d");
  if(window._mc)window._mc.destroy();
  if(_chartType==="polar"){
    // Polar: show total spend per month
    const COLORS=labels.map((_,i)=>["#7c5cbf","#059669","#e11d48","#b45309","#0369a1","#c026d3"][i%6]);
    window._mc=new Chart(ctx,{type:"polarArea",data:{labels,datasets:[{data:exp,backgroundColor:COLORS.map(c=>c+"44"),borderColor:COLORS,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:800},scales:{r:{ticks:{display:false,backdropColor:"transparent"},grid:{color:"rgba(124,92,191,0.08)"}}},plugins:{legend:{position:"right",labels:{font:{size:9,family:"Outfit"},color:"#7a6d92",boxWidth:10,padding:6}},tooltip:{backgroundColor:"#fff",titleColor:"#1a1028",bodyColor:"#7a6d92",borderColor:"#ede8f5",borderWidth:1,cornerRadius:10,callbacks:{label:c=>c.label+": "+fmt(c.raw)}}}}});
  }else if(_chartType==="bar"){
    window._mc=new Chart(ctx,{type:"bar",data:{labels,datasets:[
      {label:"Income",data:inc,backgroundColor:"rgba(5,150,105,0.15)",borderColor:"#059669",borderWidth:2,borderRadius:5},
      {label:"Expense",data:exp,backgroundColor:"rgba(124,92,191,0.12)",borderColor:"#7c5cbf",borderWidth:2,borderRadius:5}
    ]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:800},plugins:{legend:{labels:{color:"#7a6d92",font:{size:10,family:"Outfit"},usePointStyle:true}},tooltip:{backgroundColor:"#fff",titleColor:"#1a1028",bodyColor:"#7a6d92",borderColor:"#ede8f5",borderWidth:1,cornerRadius:10,padding:9,callbacks:{label:c=>"₹"+c.raw.toLocaleString("en-IN")}}},scales:{x:{ticks:{color:"#b0a5c4",font:{size:9}},grid:{display:false},border:{display:false}},y:{ticks:{color:"#b0a5c4",font:{size:9},callback:v=>"₹"+v.toLocaleString()},grid:{color:"#f0ecfa"},border:{display:false}}}}});
  }else{
    const gI=ctx.createLinearGradient(0,0,0,160);gI.addColorStop(0,"rgba(5,150,105,0.2)");gI.addColorStop(1,"rgba(5,150,105,0.01)");
    const gE=ctx.createLinearGradient(0,0,0,160);gE.addColorStop(0,"rgba(124,92,191,0.18)");gE.addColorStop(1,"rgba(124,92,191,0.01)");
    window._mc=new Chart(ctx,{type:"line",data:{labels,datasets:[
      {label:"Income",data:inc,borderColor:"#059669",backgroundColor:gI,borderWidth:2,pointRadius:3,pointBackgroundColor:"#059669",tension:.4,fill:true},
      {label:"Expense",data:exp,borderColor:"#7c5cbf",backgroundColor:gE,borderWidth:2,pointRadius:3,pointBackgroundColor:"#7c5cbf",tension:.4,fill:true}
    ]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:800},plugins:{legend:{labels:{color:"#7a6d92",font:{size:10,family:"Outfit"},usePointStyle:true}},tooltip:{backgroundColor:"#fff",titleColor:"#1a1028",bodyColor:"#7a6d92",borderColor:"#ede8f5",borderWidth:1,cornerRadius:10,padding:9,callbacks:{label:c=>"₹"+c.raw.toLocaleString("en-IN")}}},scales:{x:{ticks:{color:"#b0a5c4",font:{size:9}},grid:{display:false},border:{display:false}},y:{ticks:{color:"#b0a5c4",font:{size:9},callback:v=>"₹"+v.toLocaleString()},grid:{color:"#f0ecfa"},border:{display:false}}}}});
  }
}

async function loadChart(){try{const d=await apiFetch(API+"/monthly_summary",{headers:hdr()}).then(r=>r.json());renderChart(d);}catch{}}
async function loadMonthly(){
  const month=document.getElementById("r-month").value;if(!month)return;
  try{
    const d=await apiFetch(API+"/report/monthly?month="+month,{headers:hdr()}).then(r=>r.json());
    document.getElementById("m-title").textContent="Report: "+month;
    document.getElementById("m-stats").innerHTML=
      '<div class="st"><div class="st-l">Income</div><div class="st-v" style="color:var(--green)">'+fmt(d.total_income)+'</div></div>'+
      '<div class="st"><div class="st-l">Expenses</div><div class="st-v" style="color:var(--red)">'+fmt(d.total_expense)+'</div></div>'+
      '<div class="st"><div class="st-l">Net</div><div class="st-v" style="color:'+(d.net_savings>=0?"var(--green)":"var(--red)")+'">'+fmt(d.net_savings)+'</div></div>';
    if(d.category_breakdown){
      const entries=Object.entries(d.category_breakdown).sort((a,b)=>b[1]-a[1]);
      const maxV=Math.max(...entries.map(e=>e[1]),1);
      document.getElementById("m-cats").innerHTML=entries.map(([c,v])=>
        '<div class="cat-br"><span class="cat-br-lbl">'+c+'</span><div class="cat-br-track"><div class="cat-br-fill" style="width:0" data-w="'+Math.round(v/maxV*100)+'%"></div></div><span class="cat-br-amt">'+fmt(v)+'</span></div>'
      ).join("");
      setTimeout(()=>document.querySelectorAll(".cat-br-fill").forEach(el=>el.style.width=el.dataset.w),150);
    }
    const al=d.alerts&&d.alerts.length?d.alerts.join("<br>"):"";
    document.getElementById("m-alert").innerHTML=al?'<div style="background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--amber);margin-top:8px">⚠ '+al+'</div>':"";
  }catch{}
}
async function loadYearly(){
  const year=document.getElementById("r-year").value;if(!year)return;
  try{
    const d=await apiFetch(API+"/report/yearly?year="+year,{headers:hdr()}).then(r=>r.json());
    document.getElementById("y-title").textContent="Report: "+year;
    document.getElementById("y-stats").innerHTML=
      '<div class="st"><div class="st-l">Income</div><div class="st-v" style="color:var(--green)">'+fmt(d.total_income)+'</div></div>'+
      '<div class="st"><div class="st-l">Expenses</div><div class="st-v" style="color:var(--red)">'+fmt(d.total_expense)+'</div></div>'+
      '<div class="st"><div class="st-l">Net</div><div class="st-v" style="color:'+(d.net_savings>=0?"var(--green)":"var(--red)")+'">'+fmt(d.net_savings)+'</div></div>';
    if(d.monthly_breakdown)document.getElementById("y-months").innerHTML=Object.entries(d.monthly_breakdown).map(([m,v])=>{const s=v.savings;return'<div class="mo-row"><span style="font-weight:600;color:var(--ink2)">'+m+'</span><div style="display:flex;gap:8px;font-family:JetBrains Mono,monospace;font-size:11px"><span style="color:var(--green)">+'+fmt(v.income)+'</span><span style="color:var(--red)">-'+fmt(v.expense)+'</span><span style="color:'+(s>=0?"var(--green)":"var(--red)")+'">'+fmt(s)+'</span></div></div>';}).join("");
  }catch{}
}
async function doCSV(){try{const r=await apiFetch(API+"/export/csv",{headers:hdr()});const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="finvault_transactions.csv";a.click();URL.revokeObjectURL(url);}catch{alert("Export failed.");}}
function doPDF(){
  fetch(API+"/get_transactions",{headers:hdr()}).then(r=>r.json()).then(data=>{
    if(!data.length){alert("No transactions.");return;}
    const ICONS={Income:"💵",Subscription:"📺",Food:"🍔",Transport:"🚗",Travel:"✈️",Shopping:"🛍️",Utilities:"⚡",Health:"💊",Education:"📚",Entertainment:"🎬",Rent:"🏠",Other:"📦"};
    const tI=data.filter(t=>t.category==="Income").reduce((a,t)=>a+t.amount,0);
    const tE=data.filter(t=>t.category!=="Income").reduce((a,t)=>a+Math.abs(t.amount),0);
    const net=tI-tE;
    const catMap={};for(const t of data)if(t.category!=="Income")catMap[t.category]=(catMap[t.category]||0)+Math.abs(t.amount);
    const catR=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([c,v])=>"<tr><td>"+(ICONS[c]||"📦")+" "+c+"<\/td><td style='text-align:right'>₹"+v.toLocaleString("en-IN")+"<\/td><\/tr>").join("");
    const txR=data.slice().reverse().map(t=>{const i=t.category==="Income";return"<tr><td>"+t.date+"<\/td><td>"+t.merchant+"<\/td><td>"+t.category+"<\/td><td style='text-align:right;color:"+(i?"#059669":"#e11d48")+"'>"+(i?"+":"-")+"₹"+Math.abs(t.amount).toLocaleString("en-IN")+"<\/td><\/tr>";}).join("");
    const css="body{font-family:Arial;color:#1a1028;padding:28px;max-width:860px;margin:0 auto}h1{font-size:24px;color:#7c5cbf;margin-bottom:4px}.sub{font-size:12px;color:#7a6d92;margin-bottom:24px}.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}.sm{background:#f5f0ff;border:1.5px solid #ddd6fe;border-radius:10px;padding:12px}.sl{font-size:9px;font-weight:700;text-transform:uppercase;color:#b0a5c4;margin-bottom:5px}.sv{font-size:18px;font-weight:700}h2{font-size:14px;color:#7c5cbf;border-bottom:2px solid #ede8f5;padding-bottom:4px;margin:16px 0 8px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:6px 8px;background:#f5f0ff;color:#5b3fa0;font-size:10px;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #ede8f5}";
    const html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>FinVault Report<\/title><style>"+css+"<\/style><\/head><body><h1>💜 FinVault Report<\/h1><p class='sub'>"+new Date().toLocaleDateString("en-IN",{dateStyle:"long"})+" · "+data.length+" transactions<\/p><div class='sum'><div class='sm'><div class='sl'>Income<\/div><div class='sv' style='color:#059669'>₹"+tI.toLocaleString("en-IN")+"<\/div><\/div><div class='sm'><div class='sl'>Expenses<\/div><div class='sv' style='color:#e11d48'>₹"+tE.toLocaleString("en-IN")+"<\/div><\/div><div class='sm'><div class='sl'>Net<\/div><div class='sv' style='color:"+(net>=0?"#059669":"#e11d48")+"'>₹"+Math.abs(net).toLocaleString("en-IN")+"<\/div><\/div><\/div><h2>By Category<\/h2><table><thead><tr><th>Category<\/th><th style='text-align:right'>Amount<\/th><\/tr><\/thead><tbody>"+catR+"<\/tbody><\/table><h2>All Transactions<\/h2><table><thead><tr><th>Date<\/th><th>Merchant<\/th><th>Category<\/th><th style='text-align:right'>Amount<\/th><\/tr><\/thead><tbody>"+txR+"<\/tbody><\/table><\/body><\/html>";
    const w=window.open("","_blank");w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);
  }).catch(()=>alert("Failed. Is backend running?"));
}
loadChart();
</script>
<script>
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
</body></html>
